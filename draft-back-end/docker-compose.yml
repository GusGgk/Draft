version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: draft-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: draft_db
      MYSQL_USER: draft_user
      MYSQL_PASSWORD: secretpassword
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
